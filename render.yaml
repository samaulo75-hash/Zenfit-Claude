# Render Blueprint — despliega backend (Docker) + frontend (static).
# Puedes usarlo con "New > Blueprint" en Render, o seguir DEPLOY.md a mano.
# Las variables marcadas sync:false las rellenas tú en el panel de Render.

services:
  # ---------- BACKEND (Spring Boot vía Docker) ----------
  - type: web
    name: zenfit-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    region: frankfurt
    healthCheckPath: /swagger-ui.html
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_URL          # jdbc:postgresql://...supabase...:5432/postgres?sslmode=require
        sync: false
      - key: DB_USERNAME     # postgres.<project-ref>
        sync: false
      - key: DB_PASSWORD     # contraseña de la BBDD de Supabase
        sync: false
      - key: JWT_SECRET      # secreto fuerte (Render lo genera)
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS   # URL del frontend, p.ej. https://zenfit-frontend.onrender.com
        sync: false

  # ---------- FRONTEND (Vue + Vite, sitio estático) ----------
  - type: web
    name: zenfit-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL   # URL del backend, p.ej. https://zenfit-backend.onrender.com
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
