# Perfil de PRODUCCIÓN (Render + Supabase)
# Se activa con SPRING_PROFILES_ACTIVE=prod (lo hace el Dockerfile).
# Todos los valores sensibles vienen de variables de entorno definidas en Render.

spring:
  datasource:
    # Ej: jdbc:postgresql://aws-0-eu-west-1.pooler.supabase.com:5432/postgres?sslmode=require
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${PORT:8080}
  error:
    include-message: always

zenfit:
  security:
    jwt:
      secret: ${JWT_SECRET}
      access-token-expiration-ms: 900000
      refresh-token-expiration-ms: 2592000000
      issuer: zenfit-api
  cors:
    # Una sola variable: URL(s) del frontend separadas por comas
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}

logging:
  level:
    root: INFO
    com.zenfit: INFO
    org.hibernate.SQL: WARN
